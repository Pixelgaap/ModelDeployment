openapi: 3.0.3
info:
  title: wav2vec2-large-xlsr-53-icelandic-ep30-967h API
  version: 1.0.0
  description: FastAPI service for automatic-speech-recognition.
servers:
  - url: http://localhost:8080
paths:
  /health:
    get:
      summary: Health check
      responses:
        "200":
          description: Service is healthy.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /predict:
    post:
      summary: Run automatic-speech-recognition inference
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InferenceRequest"
      responses:
        "200":
          description: Inference result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InferenceResponse"
components:
  schemas:
    HealthResponse:
      type: object
      required: [status, model, device]
      properties:
        status: {type: string, example: ok}
        model: {type: string, example: language-and-voice-lab/wav2vec2-large-xlsr-53-icelandic-ep30-967h}
        device: {type: string, example: auto}
    InferenceRequest:
      type: object
      description: "Request body accepts one audio input: audio_base64, audio_url, or server-local audio_path. Data URLs are accepted for audio_base64."
    InferenceResponse:
      type: object
      required: [result]
      properties:
        result: {}
