openapi: 3.0.3
info:
  title: vit_huge_plus_patch16_dinov3_qkvb_lvd1689m API
  version: 1.0.0
  description: FastAPI service for image-feature-extraction.
servers:
  - url: http://localhost:8080
paths:
  /health:
    get:
      summary: Health check
      responses:
        "200":
          description: Service is healthy.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /predict:
    post:
      summary: Run image-feature-extraction inference
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InferenceRequest"
      responses:
        "200":
          description: Inference result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InferenceResponse"
components:
  schemas:
    HealthResponse:
      type: object
      required: [status, model, device]
      properties:
        status: {type: string, example: ok}
        model: {type: string, example: timm/vit_huge_plus_patch16_dinov3_qkvb.lvd1689m}
        device: {type: string, example: auto}
    InferenceRequest:
      type: object
      description: Request body depends on the model task. See fastapi_app.py for exact validation fields.
    InferenceResponse:
      type: object
      required: [result]
      properties:
        result: {}
