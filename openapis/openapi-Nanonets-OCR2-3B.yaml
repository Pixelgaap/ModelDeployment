openapi: 3.0.3
info:
  title: Nanonets-OCR2-3B API
  version: 1.0.0
  description: API for OCR image-to-text inference.
servers:
  - url: http://localhost:8080
paths:
  /health:
    get:
      summary: Health check
      responses:
        "200":
          description: Service is healthy.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /predict:
    post:
      summary: Run OCR inference
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OCRRequest"
      responses:
        "200":
          description: OCR result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OCRResponse"
components:
  schemas:
    HealthResponse:
      type: object
      required: [status, model, device, gpu_available]
      properties:
        status: {type: string, example: healthy}
        model: {type: string, example: nanonets/Nanonets-OCR2-3B}
        device: {type: string, example: cuda:0}
        gpu_available: {type: boolean, example: true}
    OCRRequest:
      type: object
      description: "Provide exactly one image input: image_base64, image_url, or server-local image_path."
      properties:
        image_path:
          type: string
          description: Server-local image path.
        image_base64:
          type: string
          description: Base64 image bytes. Data URLs are accepted.
        image_url:
          type: string
          description: HTTP/HTTPS image URL reachable from the server.
        max_new_tokens:
          type: integer
          default: 512
          minimum: 1
          maximum: 2048
    OCRResponse:
      type: object
      required: [success, text, model]
      properties:
        success: {type: boolean, example: true}
        text: {type: string}
        model: {type: string, example: nanonets/Nanonets-OCR2-3B}
