openapi: 3.0.3
info:
  title: polish-reranker-roberta-v3 API
  version: 1.0.0
  description: API for query-document reranking.
servers:
  - url: http://localhost:8080
paths:
  /health:
    get:
      summary: Health check
      responses:
        "200":
          description: Service is healthy.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /predict:
    post:
      summary: Rank candidate documents
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RankRequest"
      responses:
        "200":
          description: Ranked documents.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RankResponse"
components:
  schemas:
    HealthResponse:
      type: object
      required: [status, model, device]
      properties:
        status: {type: string, example: ok}
        model: {type: string, example: sdadas/polish-reranker-roberta-v3}
        device: {type: string, example: auto}
    RankRequest:
      type: object
      required: [query, documents]
      properties:
        query: {type: string}
        documents:
          type: array
          minItems: 1
          items: {type: string}
    RankResult:
      type: object
      required: [document, score]
      properties:
        document: {type: string}
        score: {type: number, format: float}
    RankResponse:
      type: object
      required: [results]
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/RankResult"
