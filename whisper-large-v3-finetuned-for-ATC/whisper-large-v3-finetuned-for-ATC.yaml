openapi: 3.0.3
info:
  title: whisper-large-v3-finetuned-for-ATC API
  version: 1.0.0
  description: FastAPI service for automatic speech recognition.
servers:
  - url: http://localhost:8000
paths:
  /health:
    get:
      summary: Health check
      responses:
        "200":
          description: Service is healthy.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /transcribe:
    post:
      summary: Run inference
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InferenceRequest"
      responses:
        "200":
          description: Inference result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InferenceResponse"
components:
  schemas:
    HealthResponse:
      type: object
      required: [status, model, device]
      properties:
        status: {type: string, example: ok}
        model: {type: string, example: jacktol/whisper-large-v3-finetuned-for-ATC}
        device: {type: string, example: auto}
    InferenceRequest:
      type: object
      required: [input]
      properties:
        input:
          type: string
    InferenceResponse:
      type: object
      required: [result]
      properties:
        result: {}
