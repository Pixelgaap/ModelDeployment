openapi: 3.0.3
info:
  title: DepthPro-hf API
  version: 1.0.0
  description: FastAPI service for depth-estimation.
servers:
  - url: http://localhost:8080
paths:
  /health:
    get:
      summary: Health check
      responses:
        "200":
          description: Service is healthy.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /predict:
    post:
      summary: Run depth-estimation inference
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InferenceRequest"
      responses:
        "200":
          description: Inference result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InferenceResponse"
components:
  schemas:
    HealthResponse:
      type: object
      required: [status, model, device]
      properties:
        status: {type: string, example: ok}
        model: {type: string, example: apple/DepthPro-hf}
        device: {type: string, example: auto}
    InferenceRequest:
      type: object
      description: "Request body accepts one image input: image_base64, image_url, or server-local image_path. Data URLs are accepted for image_base64."
    InferenceResponse:
      type: object
      required: [result]
      properties:
        result: {}
