openapi: 3.0.3
info:
  title: Nanonets-OCR2-3B 模型服务 API
  description: 基于Nanonets-OCR2-3B模型的OCR文本识别服务，支持图像转文本功能
  version: 1.0.0
servers:
  - url: http://localhost:8000
    description: 本地开发服务器
paths:
  /:
    get:
      summary: 服务首页
      description: 返回服务基本信息和文档链接
      tags:
        - 首页
      responses:
        '200':
          description: 成功返回
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Nanonets-OCR2-3B OCR服务已启动"
                  docs:
                    type: string
                    example: "/docs"
                  redoc:
                    type: string
                    example: "/redoc"
  /health:
    get:
      summary: 健康检查
      description: 检查服务状态和模型加载情况
      tags:
        - 健康检查
      responses:
        '200':
          description: 服务正常
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '503':
          description: 服务不可用
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
                    example: "模型未加载"
  /ocr:
    post:
      summary: OCR文本识别
      description: 上传图像文件，返回识别出的文本内容
      tags:
        - OCR识别
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                image:
                  type: string
                  format: binary
                  description: 待识别的图像文件（支持JPG、PNG等格式）
                max_new_tokens:
                  type: integer
                  default: 512
                  description: 生成文本的最大长度
                  minimum: 1
                  maximum: 2048
      responses:
        '200':
          description: 识别成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OCRResponse'
        '400':
          description: 请求参数错误
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
        '500':
          description: 服务器内部错误
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
                    example: "推理失败: [错误信息]"
        '503':
          description: 服务不可用
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
                    example: "模型未加载"
components:
  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          description: 服务状态
          example: "healthy"
        model:
          type: string
          description: 模型名称
          example: "nanonets/Nanonets-OCR2-3B"
        device:
          type: string
          description: 当前使用的设备
          example: "cuda:0"
        gpu_available:
          type: boolean
          description: 是否有可用的GPU
          example: true
    OCRResponse:
      type: object
      properties:
        success:
          type: boolean
          description: 请求是否成功
          example: true
        text:
          type: string
          description: 识别出的文本内容
          example: "Hello, World!"
        model:
          type: string
          description: 使用的模型名称
          example: "nanonets/Nanonets-OCR2-3B"